# Auto-generated by uf init. Customize as needed.
# This file is user-owned -- uf init will not
# overwrite it after initial creation.

sources:
  # Per-repo disk sources (fine-grained provenance)
  - id: disk-local
    type: disk
    name: replicator
    config:
      path: "."

  - id: disk-dewey
    type: disk
    name: dewey
    config:
      path: "../dewey"

  - id: disk-gaze
    type: disk
    name: gaze
    config:
      path: "../gaze"

  - id: disk-homebrew-tap
    type: disk
    name: homebrew-tap
    config:
      path: "../homebrew-tap"

  - id: disk-unbound-force
    type: disk
    name: unbound-force
    config:
      path: "../unbound-force"

  - id: disk-website
    type: disk
    name: website
    config:
      path: "../website"

  # Org-level files (design papers, plans)
  - id: disk-org
    type: disk
    name: org-workspace
    config:
      path: "../"
      recursive: false

  # GitHub API (issues, PRs, READMEs)
  - id: github-unbound-force
    type: github
    name: unbound-force org
    config:
      org: unbound-force
      repos:
        - replicator
        - dewey
        - gaze
        - homebrew-tap
        - unbound-force
        - website
    refresh_interval: daily
